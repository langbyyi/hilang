    严禁将上述内容用于商业用途或任何非法活动，由此产生的一切法律责任及后果，均由使用者自行承担。<br>
    本站部分信息来源于网络，若涉及版权争议，与本站无涉。如您下载本站内容，应在下载后24小时内从设备中彻底删除。<br>
    访问或下载本站内容，即视为您已阅读并同意上述全部条款。
  </div>

# 数学公式
math_render: '' # 数学公式渲染方案，留空则不渲染，可选值: mathjax3, mathjax2, katex
mathjax_cdn_url: //cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js # Mathjax 3 CDN 地址
argon_mathjax_v2_cdn_url: //cdn.jsdelivr.net/npm/mathjax@2.7.5/MathJax.js?config=TeX-AMS_HTML # Mathjax 2 CDN 地址
katex_cdn_url: //cdn.jsdelivr.net/npm/katex@0.11.1/dist/ # Katex CDN 地址

# 代码高亮
enable_code_highlight: false # 是否启用 Highlight.js 代码高亮
code_theme: vs2015 # 代码高亮主题

# 脚本
custom_html_head: '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="/assets/css/hilang-argon.css?v=20260601"><link rel="stylesheet" href="/assets/css/hilang-footer.css?v=20260530"><link rel="stylesheet" href="/assets/js/ts.css"><script src="/assets/js/font_4964662_hcubdxwsr88.js"></script>' # 页头脚本，HTML
